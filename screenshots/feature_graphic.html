<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Feature Graphic - 완충 전우회</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
        }
        .graphic {
            width: 1024px;
            height: 500px;
            background: linear-gradient(135deg, #0A1628 0%, #1a365d 50%, #0A1628 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 배경 파티클 효과 */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: #3182F6;
            border-radius: 50%;
            opacity: 0.3;
        }

        /* 메인 콘텐츠 */
        .content {
            display: flex;
            align-items: center;
            gap: 60px;
            z-index: 10;
        }

        /* 아이콘 */
        .icon-container {
            width: 200px;
            height: 200px;
            background: #0A1628;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(49, 130, 246, 0.4);
            position: relative;
        }
        .icon-circle {
            width: 160px;
            height: 160px;
            border: 6px solid #3182F6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .icon-circle::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            border: 3px solid rgba(49, 130, 246, 0.3);
            border-radius: 50%;
        }
        .icon-text {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 48px;
            font-weight: bold;
            color: white;
            letter-spacing: -2px;
        }

        /* 텍스트 영역 */
        .text-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .title {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 64px;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 28px;
            color: #3182F6;
            font-weight: 500;
        }
        .tagline {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 20px;
            color: rgba(255,255,255,0.7);
            margin-top: 8px;
        }

        /* 번개 효과 */
        .lightning {
            position: absolute;
            width: 3px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, #3182F6, transparent);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="graphic" id="graphic">
        <!-- 파티클 배경 -->
        <div class="particles" id="particles"></div>

        <!-- 번개 효과 -->
        <div class="lightning" style="left: 10%; top: 20%; transform: rotate(15deg);"></div>
        <div class="lightning" style="right: 15%; top: 30%; transform: rotate(-10deg);"></div>
        <div class="lightning" style="left: 5%; bottom: 20%; transform: rotate(5deg);"></div>
        <div class="lightning" style="right: 8%; bottom: 25%; transform: rotate(-20deg);"></div>

        <!-- 메인 콘텐츠 -->
        <div class="content">
            <div class="icon-container">
                <div class="icon-circle">
                    <span class="icon-text">100</span>
                </div>
            </div>
            <div class="text-area">
                <div class="title">완충 전우회</div>
                <div class="subtitle">배터리 100%만 입장 가능!</div>
                <div class="tagline">충전 안 하면 퇴장당하는 전우회!</div>
            </div>
        </div>
    </div>

    <script>
        // 파티클 생성
        const particles = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = (Math.random() * 10 + 4) + 'px';
            p.style.height = p.style.width;
            p.style.left = (Math.random() * 100) + '%';
            p.style.top = (Math.random() * 100) + '%';
            p.style.opacity = Math.random() * 0.3 + 0.1;
            particles.appendChild(p);
        }
    </script>
</body>
</html>
